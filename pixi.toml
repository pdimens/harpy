[workspace]
name = "harpy"
authors = ["pdimens <pdimens@gmail.com>"]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]
version = "4.0"

[tasks]

[dependencies]
bcftools = ">=1.22"
click = ">=8.2"
conda = ">=24.8"
htslib = "1.22.*"
pysam = "0.23.*"
python = ">=3.11"
rich-click = ">=1.9.3"
samtools = ">=1.22"
seqtk = "*"
apptainer = ">=1.4.2,<2"
jupyter-book = ">=2.1.0,<3"
itables = ">=2.6.2,<3"
pandas = ">=2.3.3,<3"
altair = ">=6.0.0,<7"
papermill = ">=2.6.0,<3"
djinn = "2.3.*"
mosdepth = ">=0.3.10,<0.4"
beautysh = ">=6.4.2,<7"
ipykernel = ">=7.2.0,<8"
xeus-python = ">=0.18.1,<0.19"
polars = ">=1.39.2,<2"
vl-convert-python = ">=2.0.0rc1,<3"
snakemake-minimal = ">=9.17.2,<10"

[pypi-dependencies]
harpy = { path = ".", editable = true}
