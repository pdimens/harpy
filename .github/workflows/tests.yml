name: Test

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  TTY_COMPATIBLE: 1

jobs:
  changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      validate: ${{ steps.filter.outputs.validate }}
      deconvolve: ${{ steps.filter.outputs.deconvolve }}
      preproc: ${{ steps.filter.outputs.preproc }}
      qc: ${{ steps.filter.outputs.qc }}
      bwa: ${{ steps.filter.outputs.bwa }}
      strobealign: ${{ steps.filter.outputs.strobealign }}
      mpileup: ${{ steps.filter.outputs.mpileup }}
      freebayes: ${{ steps.filter.outputs.freebayes }}
      leviathan: ${{ steps.filter.outputs.leviathan }}
      naibr: ${{ steps.filter.outputs.naibr }}
      impute: ${{ steps.filter.outputs.impute }}
      phase: ${{ steps.filter.outputs.phase }}
      assembly: ${{ steps.filter.outputs.assembly }}
      other: ${{ steps.filter.outputs.other }}
      convert: ${{ steps.filter.outputs.convert }}
      environments: ${{ steps.filter.outputs.environments }}
      resume: ${{ steps.filter.outputs.resume }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check Which Files Have Changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: .github/filters.yml

  resume:
    needs: changes
    if: ${{ needs.changes.outputs.resume == 'true' }}
    name: resume
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: harpy qc
        run: harpy qc --setup test/fastq
      - name: resume
        run: |
          harpy resume --quiet 2 QC && \
          ls -lh  QC

  preprocess:
    needs: changes
    if: ${{ needs.changes.outputs.preproc == 'true' }}
    name: preprocess
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: harpy preproc meier2021
        run: |
          harpy preprocess meier2021 -O Preproc/meier --quiet 2 test/preproc/samples.schema test/preproc/multiplex.R* test/preproc/multiplex.I* && \
          ls -lh Preproc/meier
      - name: harpy preproc gih
        run: |
          harpy preprocess gih -O Preproc/gih --quiet 2 test/preproc/gih* && \
          ls -lh Preproc/gih


  validate:
    needs: changes
    if: ${{ needs.changes.outputs.validate == 'true' }}
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: test validate fastq
        run: |
          harpy validate fastq --quiet 2 test/fastq && \
          ls -lh Validate/fastq
      - name: test validate bam
        if: always()
        run: |
          harpy validate bam --quiet 2 test/bam && \
          ls -lh Validate/bam

  qc:
    needs: changes
    if: ${{ needs.changes.outputs.qc == 'true' }}
    name: qc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: harpy qc
        run: |
          harpy qc -x "--low_complexity_filter" --quiet 2 test/fastq && \
          ls -lh  QC

  deconvolve:
    needs: changes
    if: ${{ needs.changes.outputs.deconvolve == 'true' }}
    name: deconvolve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: harpy deconvolve
        run: |
          harpy deconvolve --quiet 2 test/fastq && \
          ls -lh Deconvolve
  
  bwa:
    needs: changes
    if: ${{ needs.changes.outputs.bwa == 'true' }}
    name: align BWA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: test bwa
        run: |
          harpy align bwa --quiet 2 -x "-A 2" test/genome/genome.fasta.gz test/fastq && \
          ls -lh Align/bwa

  strobe:
    needs: changes
    if: ${{ needs.changes.outputs.strobealign == 'true' }}
    name: align strobe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: test strobealign
        run: |
          harpy align strobe --quiet 2 test/genome/genome.fasta.gz test/fastq && \
          ls -lh Align/strobealign

  mpileup:
    needs: changes
    if: ${{ needs.changes.outputs.mpileup == 'true' }}
    name: mpileup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: snp mpileup
        run: |
          harpy snp mpileup --quiet 2 -r test/positions.bed -x "--ignore-RG" test/genome/genome.fasta.gz test/bam && \
          ls -lh SNP/mpileup
      - name: snp mpileup-pop
        run: |
          harpy snp mpileup --quiet 2 -r test/positions.bed -O SNP/poptest -p test/samples.groups test/genome/genome.fasta.gz test/bam && \
          ls -lh SNP/poptest

  freebayes:
    needs: changes
    if: ${{ needs.changes.outputs.freebayes == 'true' }}
    name: freebayes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: snp freebayes
        run: |
          harpy snp freebayes --quiet 2 -r test/positions.bed -x "-g 200" test/genome/genome.fasta.gz test/bam && \
          ls -lh  SNP/freebayes
      - name: snp freebayes-pop
        run: |
          harpy snp freebayes --quiet 2 -r test/positions.bed -O SNP/poptest -p test/samples.groups test/genome/genome.fasta.gz test/bam && \
          ls -lh SNP/poptest

  impute:
    needs: changes
    if: ${{ needs.changes.outputs.impute == 'true' }}
    name: impute
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: impute
        run: |
          harpy impute --quiet 2 --grid-size 1500 test/stitch.params test/vcf/test.bcf test/bam && \
          ls -lh Impute/*/*
      - name: impute from vcf
        if: always()
        run: |
          harpy impute --quiet 2 --grid-size 1500 --vcf-samples -O vcfImpute test/stitch.params test/vcf/test.bcf test/bam && \
          ls -lh vcfImpute/*/*
      - name: impute one region
        if: always()
        run: |
          harpy impute --quiet 2 --grid-size 1500 --vcf-samples -O regionImpute -r 3L:3000-28110227-1000 test/stitch.params test/vcf/test.bcf test/bam && \
          ls -lh regionImpute/*/*

  phase:
    needs: changes
    if: ${{ needs.changes.outputs.phase == 'true' }}
    name: phase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: phase
        run: |
          harpy phase snp --quiet 2 -x "--max_iter 10001" test/vcf/test.bcf test/bam && \
          ls -lh Phase
      - name: phase with indels
        if: always()
        run: |
          harpy phase snp --quiet 2 -O phaseindel -r test/genome/genome.fasta.gz test/vcf/test.bcf test/bam && \
          ls -lh phaseindel
      - name: phase from vcf
        if: always()
        run: |
          cp test/bam/sample1.bam test/bam/pineapple.bam && harpy-utils rename-bam -d pineapple1 test/bam/pineapple.bam
          harpy phase snp --quiet 2 --vcf-samples -O phasevcf test/vcf/test.bcf test/bam && \
          ls -lh phasevcf
      - name: phase bam
        if: always()
        run: |
          harpy phase bam --quiet 2 -O phasebam test/genome/genome.fasta.gz test/vcf/test.phased.bcf test/bam/sample*.bam && \
          ls -lh phasebam

  leviathan:
    needs: changes
    if: ${{ needs.changes.outputs.leviathan == 'true' }}
    name: sv leviathan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: leviathan
        run: |
          harpy sv leviathan --quiet 2 -m 100 -s 80,80,80 -b 1 -x "-M 2002" test/genome/genome.fasta.gz test/bam && \
          ls -lh SV/leviathan
      - name: leviathan-pop
        if: always()
        run: | 
          harpy sv leviathan --quiet 2 -m 100 -s 80,80,80 -b 1 -O SV/leviathanpop -p test/samples.groups test/genome/genome.fasta.gz test/bam && \
          ls -lh SV/leviathanpop

  naibr:
    needs: changes
    if: ${{ needs.changes.outputs.naibr == 'true' }}
    name: sv naibr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: naibr
        run: |
          harpy sv naibr --quiet 2 test/genome/genome.fasta.gz test/bam_phased && \
          ls -lh SV/naibr
      - name: naibr pop
        if: always()
        run: |
          harpy sv naibr --quiet 2 -O SV/pop -p test/samples.groups test/genome/genome.fasta.gz test/bam_phased && \
          ls -lh SV/pop

  assembly:
    needs: changes
    if: ${{ needs.changes.outputs.assembly == 'true' }}
    name: assembly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: Clear Space
        uses: jlumbroso/free-disk-space@main
      - name: test assembly
        run: |
          harpy assembly --quiet 2 -r 4000 test/fastq/sample1.* && \
          ls -lh Assembly
      - name: test metassembly
        run: |
          harpy metassembly --quiet 2 --force -r 4000 test/fastq/sample1.* && \
          ls -lh Metassembly
      - name: test metassembly without barcodes
        run: |
          harpy metassembly --unlinked --force --quiet 2 -r 4000 test/fastq/sample1.* && \
          ls -lh Metassembly

  other:
    needs: changes
    if: ${{ needs.changes.outputs.other == 'true' }}
    name: miscellaneous
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Install Harpy
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: false
          activate-environment: true
      - run: pixi run build
      - name: template impute
        run: harpy template impute
      - name: template groupings
        run: harpy template groupings test/fastq
      - name: template hpc
        run: |
          harpy template hpc-slurm
          harpy template hpc-googlebatch
          harpy template hpc-lsf
          harpy template hpc-generic

