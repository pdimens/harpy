start:
  pro: true
nav:
  mode: stack
input: .
output: .retype
url: pdimens.github.io/harpy/
meta:
  title: " | Harpy"
footer:
  copyright: "&copy; Copyright {{ year }}. All rights reserved."
showSidebarFilter: false
theme:
  base:
    base-link-weight: 500
    nav-item-text-active-weight: 700
    image-rounded: 0.75rem
    nav-item-text-stack: "#1e66f5"
lastUpdated:
  date:
    enabled: true
    source: committer
branding:
  label: v4.0
  logo: static/logo_trans.png
  logoDark: static/logo_trans.png
  logoAlign: left
favicon: static/logo_navbar.png
search:
  mode: partial
edit:
  repo: "https://github.com/pdimens/harpy/edit"
  base: /
  branch: "docs"
links:
- text: Therkildsen Lab
  link: https://therkildsen-lab.github.io/
  icon: https://therkildsen-lab.github.io/images/TherkildsenLogo.png
  target: blank
- text: Cornell GIH
  link: https://www.genomicsinnovation.cornell.edu/
  icon: static/biotech.png
  target: blank
- text: Source
  link: https://github.com/pdimens/harpy
  icon: mark-github
  target: blank
- text: Submit Issue
  link: https://github.com/pdimens/harpy/issues/new/choose
  icon: bug
  target: blank
exclude:
  - "src/"
  - "test/"
  - "harpy/"
